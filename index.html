<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistente Business Central</title>
  <!-- Estilos do site -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="chat-wrapper">
    <!-- Avatar do assistente -->
    <div id="avatar-container">
      <img id="alberto" src="assets/alberto.png" alt="Alberto" />
    </div>
    <!-- Área onde são apresentadas perguntas e respostas -->
    <div id="chat-area" class="hidden"></div>
    <!-- Campo de introdução de perguntas e botões -->
    <div id="input-container">
      <input
        type="text"
        id="question-input"
        placeholder="Faz a tua pergunta..."
        autocomplete="off"
      />
      <button id="ask-btn">Perguntar</button>
      <button id="clear-btn">Limpar</button>
    </div>
  </div>

  <!-- Bibliotecas e scripts -->
  <!-- Fuse.js para fuzzy search -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js"></script>
  <!-- Base de conhecimento -->
  <script src="data.js"></script>
  <!-- Lógica da aplicação -->
  <script src="app.js"></script>
</body>
</html>
